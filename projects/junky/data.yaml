title: Junky
description: >
  Funky jazz groove — dark, tight, syncopated. 92 BPM, 4/4.
  The pocket comes from the kick syncopation (a-of-1 and and-of-4 pushes)
  and the ghost-note bed underneath the snare backbeat.

tempo: 92
time_signature: [4, 4]
n_bars: 8     # 8-bar loop

tracks:
  - name: Drums
    type: drum_grid
    channel: 9
    steps_per_bar: 16

    # Light 8th-note swing on the "and" positions — just enough jazz
    # without losing the funk pocket.
    swing_ticks: 30
    swing_steps: [2, 6, 10, 14]

    hits:
      # --- Kick ---
      # Downbeat kicks land harder; syncopated kicks sit back slightly.
      - note: kick
        steps: [0, 8]         # beats 1 and 3 — the anchors
        velocity: 115
      - note: kick
        steps: [3, 10, 14]    # a-of-1, and-of-3, and-of-4 — the funk push
        velocity: 92

      # --- Snare ---
      - note: snare
        steps: [4, 12]        # backbeat on 2 and 4
        velocity: 105
      - note: snare            # ghost notes — the texture that makes it funky
        steps: [2, 6, 9, 11, 13, 15]
        velocity: 30

      # --- Clap (layer with snare backbeat for punch) ---
      - note: clap
        steps: [4, 12]
        velocity: 75

      # --- Hi-hat ---
      - note: closed_hat
        steps: [0, 2, 4, 6, 8, 10, 12]   # 8th notes (step 14 is open hat)
        velocity: 75
      - note: open_hat
        steps: [14]           # and-of-4 — breathes before coming back to 1
        velocity: 90

      # --- Cowbell (beats 1 & 3 — the jazz flavour on top of the funk) ---
      - note: cowbell
        steps: [0, 8]
        velocity: 65

    # Snare fill into bars 4 and 8 (escalating roll)
    fill:
      note: snare
      steps: [10, 11, 12, 13, 14, 15]
      velocity_start: 50
      velocity_ramp: 12
      every_n_bars: 4

  # ---------------------------------------------------------------------------
  # Rhodes — comping chords, 8 bars written out (loops: 1).
  # All voicings rootless: bass covers the root.
  # Stab positions vary every bar — never on a downbeat.
  #
  # Harmonic arc (2 bars each):
  #   Bars 1-2: Dm9      F4 A4 C5 E5      tonic, settled
  #   Bars 3-4: G9       B3 D4 F4 A4      Dorian IV — bright, the signature chord
  #   Bars 5-6: Fmaj7#11 A3 C4 E4 B4      chromatic mediant, floating/modal
  #   Bar  7:   Em7      G4 B4 D5 F5      ii chord, transitioning
  #   Bar  8:   A7b9     C#4 E4 G4 Bb4   altered V (= C#dim7) — maximum tension
  #             → resolves back to Dm9 at bar 1
  # ---------------------------------------------------------------------------
  - name: Rhodes
    type: sequential_melody
    channel: 2
    velocity: 80
    articulation: 0.9     # just a touch of clip — Rhodes rings naturally
    loops: 1              # 8 bars written out explicitly

    notes:
      # ---- Bars 1-2 · Dm9: F4 A4 C5 E5 ----
      # Bar 1: stabs on step 5 (e-of-2) and step 14 (and-of-4 — lands with kick+hat)
      - [null,              1.25]
      - [[F4, A4, C5, E5], 0.25]   # step 5
      - [null,              2.0]
      - [[F4, A4, C5, E5], 0.25]   # step 14
      - [null,              0.25]
      # Bar 2: single late stab on step 11 (a-of-3) — space, lets bar 1 breathe
      - [null,              2.75]
      - [[F4, A4, C5, E5], 0.25]   # step 11
      - [null,              1.0]

      # ---- Bars 3-4 · G9: B3 D4 F4 A4 ----
      # Bar 3: stabs on step 6 (and-of-2) and step 14 (and-of-4)
      - [null,              1.5]
      - [[B3, D4, F4, A4], 0.25]   # step 6
      - [null,              1.75]
      - [[B3, D4, F4, A4], 0.25]   # step 14
      - [null,              0.25]
      # Bar 4: stabs on step 6 (and-of-2) and step 10 (and-of-3, locks with kick)
      - [null,              1.5]
      - [[B3, D4, F4, A4], 0.25]   # step 6
      - [null,              0.75]
      - [[B3, D4, F4, A4], 0.25]   # step 10
      - [null,              1.25]

      # ---- Bars 5-6 · Fmaj7#11: A3 C4 E4 B4 ----
      # (B4 is the #11 of F — creates a floating, Lydian open sound)
      # Bar 5: stabs on step 5 and step 9 — close together, more urgent
      - [null,              1.25]
      - [[A3, C4, E4, B4], 0.25]   # step 5
      - [null,              0.75]
      - [[A3, C4, E4, B4], 0.25]   # step 9
      - [null,              1.5]
      # Bar 6: single stab on step 13 (e-of-4) — very sparse and late, tension rising
      - [null,              3.25]
      - [[A3, C4, E4, B4], 0.25]   # step 13
      - [null,              0.5]

      # ---- Bar 7 · Em7: G4 B4 D5 F5 ----
      # Single early stab on step 3 (a-of-1) — anticipates, creates forward pull
      - [null,              0.75]
      - [[G4, B4, D5, F5], 0.25]   # step 3
      - [null,              3.0]

      # ---- Bar 8 · A7b9: C#4 E4 G4 Bb4 ----
      # Enharmonically = C#dim7. The C# and Bb are borrowed from D harmonic minor.
      # Two stabs, step 6 and step 14 — maximum tension right before resolving to Dm9.
      - [null,              1.5]
      - [[C#4, E4, G4, Bb4], 0.25]  # step 6
      - [null,              1.75]
      - [[C#4, E4, G4, Bb4], 0.25]  # step 14
      - [null,              0.25]

  # ---------------------------------------------------------------------------
  # Bass — D minor / D Dorian. Syncopated 2-bar pattern × 4 loops = 8 bars.
  # Durations are quarter-lengths: 0.25=16th, 0.5=8th, 0.75=dotted-8th.
  # articulation 0.75 = punchy staccato (funky bass never sustains fully).
  # ---------------------------------------------------------------------------
  - name: Bass
    type: sequential_melody
    channel: 1
    velocity: 95
    articulation: 0.75
    loops: 4            # 2-bar pattern × 4 = 8 bars

    notes:
      # --- Bar A (question) — locks with kick on all 5 kick positions ---
      # Step 0:  D2 8th     beat 1, kick anchor
      - [D2,   0.5]
      # Step 2:  rest       space before the push
      - [null, 0.25]
      # Step 3:  D2 16th    a-of-1 — the key lock with syncopated kick
      - [D2,   0.25]
      # Step 4:  F2 8th     beat 2, lands under snare
      - [F2,   0.5]
      # Step 6:  G2 8th     and-of-2, keeps moving
      - [G2,   0.5]
      # Step 8:  D2 8th     beat 3, kick anchor
      - [D2,   0.5]
      # Step 10: A2 8th     and-of-3, locks with kick
      - [A2,   0.5]
      # Step 12: D3 8th     beat 4 — octave jump, the funk hook
      - [D3,   0.5]
      # Step 14: C3 8th     and-of-4 — leads back toward D (lock with kick + open hat)
      - [C3,   0.5]

      # --- Bar B (answer) — more space; rests where Bar A hit ---
      # Step 0:  D2 dotted-8th  beat 1, sits longer
      - [D2,   0.75]
      # Step 3:  A2 16th        a-of-1 — the 5th instead of root, unexpected
      - [A2,   0.25]
      # Step 4:  F2 8th         beat 2, snare
      - [F2,   0.5]
      # Steps 6-7: rest         big space — the groove breathes
      - [null, 0.5]
      # Step 8:  D2 8th         beat 3, kick anchor
      - [D2,   0.5]
      # Step 10: rest           kick hits but bass rests — contrast with Bar A
      - [null, 0.25]
      # Step 11: G2 16th        a-of-3, small fill
      - [G2,   0.25]
      # Step 12: C3 8th         beat 4 — tritone tension against D root
      - [C3,   0.5]
      # Step 14: A2 8th         and-of-4 — dominant, pulls back to D (lock with kick)
      - [A2,   0.5]
