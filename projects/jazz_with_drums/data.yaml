title: Jazz With Drums
description: ii-V-I in C major with a swing ride-cymbal drum pattern.
tempo: 120

tracks:
  - name: Jazz Chords
    type: block_chords
    channel: 0
    velocity: 80
    beats_per_chord: 4
    progression:
      - {name: Dm7,   notes: [D4, F4, A4, C5]}
      - {name: G7,    notes: [G4, B4, D5, F5]}
      - {name: Cmaj7, notes: [C4, E4, G4, B4]}

  - name: Jazz Drums
    type: drum_grid
    channel: 9
    steps_per_bar: 8        # 8th-note grid (4/4 = 8 steps)
    swing_ticks: 80         # triplet-8th swing push
    swing_steps: [3, 7]
    hits:
      - {note: ride,      steps: [0, 2, 4, 6], velocity: 65}
      - {note: ride,      steps: [3, 7],        velocity: 65}  # swung "and" on 2 & 4
      - {note: pedal_hat, steps: [2, 6],        velocity: 55}  # beats 2 and 4
