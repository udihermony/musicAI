title: "Für Elise (opening)"
description: >
  A-minor motif, 8 bars of 3/8. Right-hand melody over a sustained bass.
  The famous opening E5-D#5 alternation and the descending Am-E sequence.
time_signature: [3, 8]
tempo: 140    # eighth-note pulse (quarter-note equiv ≈ 70 BPM)

tracks:
  - name: Melody
    type: sequential_melody
    channel: 0
    velocity: 95
    # Durations as quarter-lengths: 0.25 = 16th, 0.5 = 8th, 0.75 = dotted-8th
    notes:
      # Bar 1 (Am): E5 D#5 E5 D#5 E5 B4 — the motif
      - [E5,   0.25]
      - [D#5,  0.25]
      - [E5,   0.25]
      - [D#5,  0.25]
      - [E5,   0.25]
      - [B4,   0.25]
      # Bar 2 (Am): D5 C5 A4 — rest
      - [D5,   0.25]
      - [C5,   0.25]
      - [A4,   0.5]
      - [null, 0.5]
      # Bar 3 (Am): C4 E4 A4 B4 — rising answer
      - [C4,   0.25]
      - [E4,   0.25]
      - [A4,   0.25]
      - [B4,   0.5]
      - [null, 0.25]
      # Bar 4 (E): E4 G#4 B4 C5 — leading tone, lands on C
      - [E4,   0.25]
      - [G#4,  0.25]
      - [B4,   0.25]
      - [C5,   0.5]
      - [null, 0.25]
      # Bar 5 (Am): repeat of bar 1
      - [E5,   0.25]
      - [D#5,  0.25]
      - [E5,   0.25]
      - [D#5,  0.25]
      - [E5,   0.25]
      - [B4,   0.25]
      # Bar 6 (Am): repeat of bar 2
      - [D5,   0.25]
      - [C5,   0.25]
      - [A4,   0.5]
      - [null, 0.5]
      # Bar 7 (Am): same rising answer
      - [C4,   0.25]
      - [E4,   0.25]
      - [A4,   0.25]
      - [B4,   0.5]
      - [null, 0.25]
      # Bar 8 (E -> Am): E4 C5 B4 A4 — cadence home
      - [E4,   0.25]
      - [C5,   0.25]
      - [B4,   0.25]
      - [A4,   0.75]

  - name: Bass
    type: sustained_notes
    channel: 1
    velocity: 70
    # One sustained note per bar (3 eighths = 1.5 quarter-lengths).
    # A2 under Am bars, E2 under the leading-tone bar.
    notes:
      - [A2, 1.5]   # bar 1  Am
      - [A2, 1.5]   # bar 2  Am
      - [A2, 1.5]   # bar 3  Am
      - [E2, 1.5]   # bar 4  E (G# in melody = leading tone)
      - [A2, 1.5]   # bar 5  Am
      - [A2, 1.5]   # bar 6  Am
      - [A2, 1.5]   # bar 7  Am
      - [E2, 1.5]   # bar 8  E -> resolves to A on the loop
