title: "Nocturne in E minor"
subtitle: "Lamplight"
composer: "for Ehud · generated"
description: >
  Ternary A-B-A' + coda, 28 bars of 6/8 at Andante. A singing right-hand melody
  over a rocking left-hand broken-chord arpeggio, with sustain pedal each bar.
  Ends on a Picardy third (E major). Original solo-piano character piece.

time_signature: [6, 8]
# In 6/8 the beat unit is an eighth note. Durations below are quarter-lengths:
# 0.25 = 16th, 0.5 = eighth, 0.75 = dotted-eighth, 1.0 = quarter, 1.5 = dotted-quarter.
tempo: 76    # quarter-note BPM (Andante)

# Section dynamics (by 0-based bar index in the score list)
dynamics:
  0:  mp   # A
  8:  mf   # B — brighter
  16: f    # A' — fuller
  24: p    # coda — hushed

# tracks: references the shared data below (voicings, melodies, score, lh_arpeggio).
tracks:
  - name: Piano RH
    type: scored_melody
    channel: 0
    program: 0
    velocity_offset: 4    # RH sings slightly louder than the section base

  - name: Piano LH
    type: arpeggio_lh
    channel: 0
    pedal: true
    velocity_offset: -26  # softer than RH

# Left-hand arpeggio contour: indices into [bass, u1, u2, u3, u4] per bar.
lh_arpeggio: [0, 1, 2, 3, 4, 3]   # 6 steps = 6 eighths = one 6/8 bar

# Chord voicings: bass note + 4 ascending upper tones.
# The A-section "line cliché" keeps the Em triad on top while only the bass moves.
voicings:
  Em:
    bass: E2
    upper: [B3, E4, G4, B4]
  Em/D#:
    bass: D#2
    upper: [B3, E4, G4, B4]     # maj7 in bass (the chromatic descent)
  Em/D:
    bass: D2
    upper: [B3, E4, G4, B4]     # m7 in bass
  Em/C#:
    bass: C#2
    upper: [B3, E4, G4, B4]     # 6 in bass
  Cmaj7:
    bass: C2
    upper: [C4, E4, G4, B4]
  B7:
    bass: B1
    upper: [B3, D#4, F#4, A4]
  D7:
    bass: D2
    upper: [A3, C4, F#4, C5]    # V7 of G — pivots to B section
  G:
    bass: G2
    upper: [B3, D4, G4, B4]
  D/F#:
    bass: F#2
    upper: [A3, D4, F#4, A4]
  Em7:
    bass: E2
    upper: [B3, D4, G4, B4]
  C:
    bass: C2
    upper: [C4, E4, G4, C5]
  Am7:
    bass: A1
    upper: [C4, E4, G4, A4]
  B7b9:
    bass: B1
    upper: [C4, D#4, F#4, A4]   # b9 = C, the ache before the coda
  E:
    bass: E2
    upper: [G#3, B3, E4, G#4]   # Picardy major — the glow

