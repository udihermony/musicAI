title: Jazz Blues
description: F jazz blues — 12-bar form with walking bass and swing drums. 4 loops.

tempo: 120
velocity: 80
loops: 4

# 12-bar blues in F. beats = quarter notes this chord lasts.
progression:
  - name: F7
    notes: [F4, A4, C5, Eb5]
    beats: 4                    # I7
  - name: Bb7
    notes: [Bb3, D4, F4, Ab4]
    beats: 4                    # IV7
  - name: F7
    notes: [F4, A4, C5, Eb5]
    beats: 4                    # I7
  - name: Cm7
    notes: [C4, Eb4, G4, Bb4]
    beats: 2                    # ii of IV
  - name: F7
    notes: [F4, A4, C5, Eb5]
    beats: 2                    # V7 of IV
  - name: Bb7
    notes: [Bb3, D4, F4, Ab4]
    beats: 4                    # IV7
  - name: Bdim7
    notes: [B3, D4, F4, Ab4]
    beats: 4                    # #IV diminished passing chord
  - name: F7
    notes: [F4, A4, C5, Eb5]
    beats: 4                    # I7
  - name: D7
    notes: [D4, F#4, A4, C5]
    beats: 4                    # V of ii (secondary dominant)
  - name: Gm7
    notes: [G3, Bb3, D4, F4]
    beats: 4                    # ii
  - name: C7
    notes: [C4, E4, G4, Bb4]
    beats: 4                    # V7
  - name: F7
    notes: [F4, A4, C5, Eb5]
    beats: 4                    # I7
  - name: Gm7
    notes: [G3, Bb3, D4, F4]
    beats: 2                    # turnaround ii
  - name: C7
    notes: [C4, E4, G4, Bb4]
