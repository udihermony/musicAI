# Walking bass — 12 bars × 4 beats. Last beat approaches the next root chromatically.
walking_bass:
  note_gap: 20
  velocity: 85
  bars:
    - [F2,  A2,  C3,  B2]   # F7     (→ Bb)
    - [Bb2, D3,  F3,  E3]   # Bb7    (→ F)
    - [F2,  A2,  C3,  B2]   # F7     (→ C)
    - [C3,  Eb3, F2,  B2]   # Cm7|F7 (→ Bb)
    - [Bb2, D3,  F3,  C3]   # Bb7    (→ B)
    - [B2,  D3,  F3,  Ab3]  # Bdim7  (→ F)
    - [F2,  A2,  C3,  C#3]  # F7     (→ D)
    - [D3,  F#3, A3,  Ab3]  # D7     (→ G)
    - [G2,  Bb2, D3,  C#3]  # Gm7    (→ C)
    - [C3,  E3,  G3,  F#3]  # C7     (→ F)
    - [F2,  A2,  C3,  Ab2]  # F7     (→ G)
    - [G2,  Bb2, C3,  E2]   # Gm7|C7 (→ F loop)

drums:
  steps_per_bar: 8
  hits:
    - note: ride
      steps: [0, 2, 4, 6]
      velocity: 65
    - note: ride
      steps: [3, 7]
      velocity: 65
    - note: pedal_hat
      steps: [2, 6]
      velocity: 55
  swing_steps: [3, 7]
  swing_ticks: 80
